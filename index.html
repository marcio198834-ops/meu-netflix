<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Meu Netflix</title>
<style>
body {
margin: 0;
background: black;
color: white;
font-family: Arial;
}

.header {
padding: 20px;
font-size: 30px;
color: red;
font-weight: bold;
}

.row {
display: flex;
overflow-x: auto;
gap: 10px;
padding: 20px;
}

.card {
min-width: 200px;
height: 120px;
background: gray;
border-radius: 10px;
display: flex;
align-items: center;
justify-content: center;
font-size: 18px;
cursor: pointer;
transition: 0.3s;
}

.card:hover {
transform: scale(1.1);
}

.banner {
height: 300px;
background: url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4') center/cover;
display: flex;
align-items: flex-end;
padding: 20px;
font-size: 25px;
}
</style>
</head>
<body>

<div class="header">Meu Netflix</div>

<div class="banner">
Filme em destaque
</div>

<h2 style="padding-left:20px;">Filmes</h2>
<div class="row">
<div class="card">Filme 1</div>
<div class="card">Filme 2</div>
<div class="card">Filme 3</div>
<div class="card">Filme 4</div>
</div>

<h2 style="padding-left:20px;">Séries</h2>
<div class="row">
<div class="card">Série 1</div>
<div class="card">Série 2</div>
<div class="card">Série 3</div>
</div>

</body>
</html>
