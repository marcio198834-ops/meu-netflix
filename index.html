<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Meu Netflix</title>

<style>
body {
margin: 0;
background: #141414;
color: white;
font-family: Arial, sans-serif;
}

.header {
position: fixed;
top: 0;
width: 100%;
background: rgba(0,0,0,0.8);
padding: 15px 30px;
font-size: 25px;
color: red;
font-weight: bold;
z-index: 10;
}

.banner {
margin-top: 60px;
height: 400px;
background: url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4') center/cover;
display: flex;
flex-direction: column;
justify-content: flex-end;
padding: 30px;
}

.banner h1 {
font-size: 40px;
}

.banner button {
padding: 10px 20px;
background: white;
border: none;
font-weight: bold;
cursor: pointer;
width: 120px;
margin-top: 10px;
}

.row {
display: flex;
overflow-x: auto;
padding: 20px;
gap: 10px;
}

.card {
min-width: 200px;
height: 120px;
background: #333;
border-radius: 10px;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
transition: 0.3s;
}

.card:hover {
transform: scale(1.1);
background: #555;
}
</style>

</head>
<body>

<div class="header">NETFLIX</div>

<div class="banner">
<h1>Filme em Destaque</h1>
<button>Play</button>
</div>

<h2 style="padding-left:20px;">🔥 Populares</h2>
<div class="row">
<div class="card">Filme 1</div>
<div class="card">Filme 2</div>
<div class="card">Filme 3</div>
<div class="card">Filme 4</div>
</div>

<h2 style="padding-left:20px;">🎬 Séries</h2>
<div class="row">
<div class="card">Série 1</div>
<div class="card">Série 2</div>
<div class="card">Série 3</div>
</div>

</body>
</html>
